[pytest]
# Pytest configuration for fever routing tests

# Python path configuration
pythonpath = src

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    critical: Safety-critical tests that MUST NEVER FAIL (select with -m critical)
    integration: End-to-end integration tests with full LangGraph agent (select with -m integration)
    slow: Slow tests that can be skipped for quick checks (select with -m "not slow")

# Output options
addopts =
    --strict-markers
    --tb=short
    -ra

# Test paths
testpaths = tests

# Asyncio configuration (if needed for future async tests)
asyncio_mode = auto
